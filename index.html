<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCalc — Professional Crypto Analytics & Calculator</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --brand: #2962ff; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }
        
        header { 
            background: rgba(30, 41, 59, 0.8); backdrop-filter: blur(10px);
            padding: 15px 5%; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; justify-content: space-between; align-items: center;
            position: sticky; top: 0; z-index: 100;
        }
        .logo { font-weight: 900; color: var(--brand); text-decoration: none; font-size: 1.5rem; letter-spacing: -1px; }
        .nav a { margin-left: 20px; text-decoration: none; color: #94a3b8; font-weight: 600; font-size: 0.85rem; transition: 0.3s; }
        .nav a:hover { color: #fff; }

        .hero { text-align: center; padding: 60px 20px 40px; }
        h1 { font-size: 3rem; font-weight: 900; letter-spacing: -2px; margin-bottom: 10px; background: linear-gradient(to right, #60a5fa, #2962ff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        p { color: #94a3b8; font-size: 1.1rem; }

        .main-grid { 
            max-width: 1200px; margin: 0 auto 60px; padding: 0 20px;
            display: grid; grid-template-columns: 1fr 350px; gap: 30px;
        }

        .widget-container { 
            background: var(--card); border-radius: 24px; padding: 20px; 
            border: 1px solid rgba(255,255,255,0.1); min-height: 500px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
        }

        .calc-sidebar {
            display: flex; flex-direction: column; gap: 20px;
        }

        .side-card {
            background: var(--card); border-radius: 20px; padding: 25px;
            border: 1px solid rgba(255,255,255,0.1);
        }

        .side-card h3 { font-size: 0.9rem; text-transform: uppercase; color: #64748b; margin-bottom: 15px; letter-spacing: 1px; }

        /* Стили для кастомного мини-калькулятора (Fallback) */
        .simple-calc input {
            width: 100%; background: #0f172a; border: 1px solid #334155;
            padding: 12px; border-radius: 10px; color: #fff; font-weight: 700; font-size: 1.2rem; margin-bottom: 15px; outline: none;
        }
        .simple-calc select {
            width: 100%; background: #334155; border: none; padding: 10px; border-radius: 8px; color: #fff; font-weight: 600; cursor: pointer;
        }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            h1 { font-size: 2.2rem; }
        }

        footer { text-align: center; padding: 60px; color: #475569; border-top: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">SmartCalc</a>
    <div class="nav">
        <a href="https://n1043mn1ght-web.github.io">Tools</a>
        <a href="https://n1043mn1ght-web.github.io">Mortgage</a>
        <a href="https://n1043mn1ght-web.github.io">Invest</a>
    </div>
</header>

<section class="hero">
    <h1>Crypto Analytics</h1>
    <p>Professional grade real-time market evaluation</p>
</section>

<div class="main-grid">
    <!-- ГРАФИК И ЦЕНЫ (TradingView) -->
    <div class="widget-container">
        <!-- TradingView Widget BEGIN -->
        <div class="tradingview-widget-container" style="height:100%;width:100%">
            <div id="tradingview_chart" style="height:calc(100% - 32px);width:100%"></div>
            <script type="text/javascript" src="https://s3.tradingview.com"></script>
            <script type="text/javascript">
            new TradingView.widget({
              "autosize": true,
              "symbol": "BINANCE:BTCUSDT",
              "interval": "D",
              "timezone": "Etc/UTC",
              "theme": "dark",
              "style": "1",
              "locale": "en",
              "toolbar_bg": "#f1f3f6",
              "enable_publishing": false,
              "hide_side_toolbar": false,
              "allow_symbol_change": true,
              "container_id": "tradingview_chart"
            });
            </script>
        </div>
        <!-- TradingView Widget END -->
    </div>

    <!-- БОКОВАЯ ПАНЕЛЬ С КАЛЬКУЛЯТОРОМ -->
    <div class="calc-sidebar">
        <div class="side-card">
            <h3>Quick Conversion</h3>
            <!-- TradingView Calculator Widget -->
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com" async>
                {
                  "width": "100%",
                  "height": 400,
                  "defaultColumn": "overview",
                  "screener_type": "crypto_mkt",
                  "displayCurrency": "USD",
                  "colorTheme": "dark",
                  "locale": "en"
                }
                </script>
            </div>
        </div>

        <div class="side-card">
            <h3>Market Sentiment</h3>
            <div class="tradingview-widget-container">
                <div class="tradingview-widget-container__widget"></div>
                <script type="text/javascript" src="https://s3.tradingview.com" async>
                {
                  "interval": "1m",
                  "width": "100%",
                  "isTransparent": true,
                  "height": 350,
                  "symbol": "BINANCE:BTCUSDT",
                  "showIntervalTabs": true,
                  "displayMode": "single",
                  "locale": "en",
                  "colorTheme": "dark"
                }
                </script>
            </div>
        </div>
    </div>
</div>

<footer>
    &copy; 2026 SmartCalc Global. Powered by TradingView Technology.
</footer>

</body>
</html>
