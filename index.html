<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCalc Crypto — Live Asset Calculator & Rates</title>
    <meta name="description" content="Professional cryptocurrency calculator by SmartCalc. High-precision live rates for BTC, ETH, SOL and more. No registration required.">
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --brand: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; --muted: #64748b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; }
        header { background: #fff; padding: 1rem 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #e2e8f0; }
        .logo { font-weight: 900; font-size: 1.4rem; color: var(--brand); text-decoration: none; display: flex; align-items: center; gap: 8px; }
        nav a { text-decoration: none; color: var(--muted); font-weight: 600; font-size: 0.9rem; margin-left: 20px; transition: 0.2s; }
        nav a:hover { color: var(--brand); }
        .container { max-width: 600px; margin: 80px auto; padding: 0 20px; text-align: center; }
        h1 { font-size: 2.2rem; font-weight: 900; margin-bottom: 10px; color: #0f172a; letter-spacing: -0.03em; }
        .subtitle { color: var(--muted); margin-bottom: 40px; font-weight: 500; }
        .calc-wrapper {
            background: var(--card); border-radius: 28px; padding: 25px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #e2e8f0; min-height: 480px; position: relative;
        }
        /* Стилизация виджета под наш бренд */
        crypto-converter-widget { --cg-font-family: 'Inter', sans-serif !important; }
        footer { text-align: center; padding: 40px; color: #94a3b8; font-size: 0.85rem; border-top: 1px solid #e2e8f0; margin-top: 60px; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">SmartCalc</a>
    <nav>
        <a href="https://n1043mn1ght-web.github.io">Tools</a>
        <a href="https://n1043mn1ght-web.github.io">Mortgage</a>
        <a href="https://n1043mn1ght-web.github.io">Invest</a>
    </nav>
</header>

<div class="container">
    <h1>Crypto Calculator</h1>
    <p class="subtitle">Professional real-time digital asset evaluation</p>

    <div class="calc-wrapper">
        <!-- БЕЗОТКАЗНЫЙ ВИДЖЕТ (ВСТРОЕННАЯ ИЗОЛЯЦИЯ) -->
        <script src="https://www.coingecko.com"></script>
        <crypto-converter-widget 
            font-family="Inter" 
            shadow="false" 
            border-radius="20" 
            fiat="usd" 
            crypto="bitcoin" 
            background-color="#ffffff" 
            decimal-format="2">
        </crypto-converter-widget>
    </div>
</div>

<footer>
    &copy; 2026 SmartCalc Global Analytics. <br> High-Precision Market Data provided by CoinGecko.
</footer>

</body>
</html>
