<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCalc — Professional Crypto Calculator</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --brand: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        
        header { 
            background: #fff; padding: 15px 5%; border-bottom: 1px solid #e2e8f0;
            display: flex; justify-content: space-between; align-items: center;
        }
        .logo { font-weight: 900; color: var(--brand); text-decoration: none; font-size: 1.5rem; letter-spacing: -1px; }
        .nav a { margin-left: 20px; text-decoration: none; color: #64748b; font-weight: 600; font-size: 0.85rem; }

        .container { max-width: 800px; margin: 60px auto; padding: 0 20px; text-align: center; }
        h1 { font-size: 2.5rem; font-weight: 900; margin-bottom: 10px; color: #0f172a; }
        p { color: #64748b; margin-bottom: 40px; }

        .calc-wrapper {
            background: var(--card); border-radius: 24px; padding: 20px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
            border: 1px solid #e2e8f0;
            overflow: hidden;
            min-height: 500px;
        }

        footer { text-align: center; padding: 60px; color: #94a3b8; font-size: 0.8rem; }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">SmartCalc</a>
    <div class="nav">
        <a href="https://n1043mn1ght-web.github.io">All Tools</a>
        <a href="https://n1043mn1ght-web.github.io">Mortgage</a>
        <a href="https://n1043mn1ght-web.github.io">Invest</a>
    </div>
</header>

<div class="container">
    <h1>Crypto Calculator</h1>
    <p>Real-time exchange rates and digital asset evaluation</p>

    <div class="calc-wrapper">
        <!-- БЕЗОПАСНЫЙ ВИДЖЕТ (НЕ БЛОКИРУЕТСЯ БРАУЗЕРАМИ) -->
        <script src="https://www.coingecko.com"></script>
        <crypto-converter-widget 
            font-family="Inter" 
            shadow="false" 
            border-radius="16" 
            fiat="usd" 
            crypto="bitcoin" 
            background-color="#ffffff" 
            decimal-format="8">
        </crypto-converter-widget>
    </div>
</div>

<footer>
    &copy; 2026 SmartCalc Global. Data by CoinGecko. Professional Analytics Service.
</footer>

</body>
</html>
