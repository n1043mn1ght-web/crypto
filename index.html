<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SmartCalc Crypto — Live Real-Time Calculator</title>
    <link href="https://fonts.googleapis.com" rel="stylesheet">
    <style>
        :root { --brand: #4f46e5; --bg: #f8fafc; --card: #ffffff; --text: #1e293b; }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
        header { background: #fff; padding: 15px 5%; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; align-items: center; }
        .logo { font-weight: 900; color: var(--brand); text-decoration: none; font-size: 1.5rem; }
        .container { max-width: 450px; margin: 60px auto; padding: 20px; }
        .card { background: #fff; padding: 35px; border-radius: 28px; box-shadow: 0 10px 40px rgba(0,0,0,0.06); border: 1px solid #e2e8f0; }
        .input-group { background: #f1f5f9; padding: 18px; border-radius: 16px; margin-bottom: 10px; }
        label { display: block; font-size: 0.7rem; font-weight: 800; color: #64748b; text-transform: uppercase; margin-bottom: 8px; }
        .row { display: flex; align-items: center; gap: 10px; }
        input { flex: 1; background: none; border: none; font-size: 1.5rem; font-weight: 800; outline: none; width: 100%; color: var(--text); }
        select { background: #fff; border: 1px solid #cbd5e1; padding: 6px; border-radius: 8px; font-weight: 700; cursor: pointer; }
        .result { margin-top: 30px; text-align: center; padding-top: 25px; border-top: 2px dashed #f1f5f9; }
        .val { font-size: 2.2rem; font-weight: 900; color: var(--brand); margin-bottom: 5px; }
        .status { color: #10b981; font-size: 0.7rem; font-weight: 800; display: flex; align-items: center; justify-content: center; gap: 5px; }
        .dot { width: 8px; height: 8px; background: #10b981; border-radius: 50%; animation: pulse 1s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.3; } 100% { opacity: 1; } }
    </style>
</head>
<body>

<header>
    <a href="#" class="logo">SmartCalc</a>
</header>

<div class="container">
    <div class="card">
        <h1 style="text-align:center; margin-bottom:20px;">Crypto Calc</h1>
        
        <div class="input-group">
            <label id="inputLabel">You Pay (USD)</label>
            <div class="row">
                <input type="number" id="amount" value="1000" step="any">
            </div>
        </div>

        <div class="input-group">
            <label>Select Asset</label>
            <div class="row">
                <select id="asset" style="width: 100%;">
                    <option value="btcusdt">Bitcoin (BTC)</option>
                    <option value="ethusdt">Ethereum (ETH)</option>
                    <option value="solusdt">Solana (SOL)</option>
                    <option value="bnbusdt">BNB</option>
                </select>
            </div>
        </div>

        <div class="result">
            <div class="status"><div class="dot"></div> LIVE STREAM CONNECTED</div>
            <div style="font-size: 0.9rem; color: #64748b; margin-bottom: 10px;">You will receive approximately:</div>
            <div id="resValue" class="val">0.00000000</div>
            <div id="unitPrice" style="font-size: 0.8rem; color: #94a3b8; margin-top: 10px;">Price: Loading...</div>
        </div>
    </div>
</div>

<script>
    const amountInput = document.getElementById('amount');
    const assetSelect = document.getElementById('asset');
    const resValue = document.getElementById('resValue');
    const unitPrice = document.getElementById('unitPrice');

    let currentPrice = 0;
    let ws;

    function connectWS() {
        if (ws) ws.close();
        
        const symbol = assetSelect.value;
        // Binance Stream напрямую без HTTP запросов
        ws = new WebSocket(`wss://://stream.binance.com{symbol}@ticker`);

        ws.onmessage = (event) => {
            const data = JSON.parse(event.data);
            currentPrice = parseFloat(data.c); // Текущая цена закрытия
            updateCalculation();
        };

        ws.onerror = () => {
            unitPrice.innerText = "Connection Error. Retrying...";
        };
    }

    function updateCalculation() {
        const amt = parseFloat(amountInput.value) || 0;
        if (currentPrice > 0 && amt > 0) {
            const result = amt / currentPrice;
            resValue.innerText = result.toFixed(8);
            unitPrice.innerText = `1 ${assetSelect.value.replace('usdt','').toUpperCase()} = $${currentPrice.toLocaleString()}`;
        }
    }

    amountInput.addEventListener('input', updateCalculation);
    assetSelect.addEventListener('change', connectWS);

    // Стартуем
    connectWS();
</script>

</body>
</html>
